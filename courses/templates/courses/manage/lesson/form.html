{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

  <h3 class="mb-4">
    {% if lesson %}Редагувати урок{% else %}Новий урок{% endif %}
  </h3>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-success">💾 Зберегти</button>
    <a href="{% url 'course_studio' course.id %}" class="btn btn-secondary">Назад</a>
  </form>

</div>
{% endblock %}
